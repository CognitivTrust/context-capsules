name: Bug report
description: Something is broken or behaving unexpectedly.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it quickly.

        **Before filing:** run `capsule doctor` and include the output. Check [docs/TROUBLESHOOTING.md](../docs/TROUBLESHOOTING.md) for known issues.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands you ran, in order.
      placeholder: |
        1. capsule init
        2. capsule record decision --decision "..." --rationale "..."
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include the full error output.
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: capsule doctor output
      description: Run `capsule doctor` and paste the full output here.
      render: text
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `capsule --version`
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant (shell, terminal emulator, venv tool, etc.).
