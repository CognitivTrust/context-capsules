name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install build

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(python -c "import importlib.metadata; print(importlib.metadata.version('context-capsule'))")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Tag $GITHUB_REF_NAME does not match package version $PKG_VERSION"
            exit 1
          fi

      - run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  smoke-test-testpypi:
    name: Smoke-test TestPyPI install
    needs: publish-testpypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install from TestPyPI
        run: |
          pip install --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            context-capsule
      - run: capsule --version

  publish-pypi:
    name: Publish to PyPI
    needs: smoke-test-testpypi
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub release
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog entry
        id: changelog
        run: |
          python - <<'EOF'
          import re, sys
          text = open("CHANGELOG.md").read()
          # Extract the first versioned section (not [Unreleased])
          m = re.search(r"## \[\d+\.\d+\.\d+\][^\n]*\n(.*?)(?=\n## |\Z)", text, re.DOTALL)
          notes = m.group(1).strip() if m else "See CHANGELOG.md for details."
          with open(os.environ.get("GITHUB_OUTPUT",""), "a") as f:
              f.write(f"notes<<EOF\n{notes}\nEOF\n")
          EOF

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: false
