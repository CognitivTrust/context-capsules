<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 220" role="img" aria-labelledby="title-event-timeline" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <title id="title-event-timeline">Five typed events appended in order along a single timeline, with task start and end as an optional extension</title>

  <defs>
    <marker id="arrow-slate-2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1038" height="218" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <line x1="50" y1="150" x2="930" y2="150" stroke="#CBD5E1" stroke-width="2.5" marker-end="url(#arrow-slate-2)"/>
  <text x="960" y="155" font-size="12" fill="#64748B">append&#8201;&#8201;only</text>

  <!-- intent -->
  <line x1="110" y1="150" x2="110" y2="120" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="50" y="62" width="120" height="50" rx="10" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
  <text x="110" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#312E81" font-family="ui-monospace, Menlo, Consolas, monospace">intent</text>

  <!-- decision -->
  <line x1="285" y1="150" x2="285" y2="120" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="225" y="62" width="120" height="50" rx="10" fill="#F0FDFA" stroke="#0D9488" stroke-width="2"/>
  <text x="285" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#115E59" font-family="ui-monospace, Menlo, Consolas, monospace">decision</text>

  <!-- question -->
  <line x1="460" y1="150" x2="460" y2="120" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="400" y="62" width="120" height="50" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="460" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#4C1D95" font-family="ui-monospace, Menlo, Consolas, monospace">question</text>

  <!-- resolution -->
  <line x1="635" y1="150" x2="635" y2="120" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="565" y="62" width="140" height="50" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="2"/>
  <text x="635" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#92400E" font-family="ui-monospace, Menlo, Consolas, monospace">resolution</text>

  <!-- progress -->
  <line x1="820" y1="150" x2="820" y2="120" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="755" y="62" width="130" height="50" rx="10" fill="#F0F9FF" stroke="#0284C7" stroke-width="2"/>
  <text x="820" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#0C4A6E" font-family="ui-monospace, Menlo, Consolas, monospace">progress</text>

  <text x="490" y="200" text-anchor="middle" font-size="12.5" fill="#94A3B8" font-style="italic">+ optional task_start / task_end wrap a unit of work end-to-end</text>
</svg>
