<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" role="img" aria-labelledby="title-before-after" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <title id="title-before-after">Diagram comparing scattered project knowledge today against a single ordered record with Context Capsules</title>

  <defs>
    <marker id="arrow-indigo" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6366F1"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="998" height="538" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <text x="250" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#0F172A">Today</text>
  <text x="250" y="74" text-anchor="middle" font-size="14" fill="#64748B">scattered, disconnected, forgotten in a week</text>

  <text x="750" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#0F172A">With Context Capsules</text>
  <text x="750" y="74" text-anchor="middle" font-size="14" fill="#64748B">one ordered, append-only record</text>

  <line x1="500" y1="100" x2="500" y2="510" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="2 8" stroke-linecap="round"/>

  <!-- Left: scattered chips -->
  <g transform="rotate(-7 130 150)">
    <rect x="60" y="128" width="140" height="44" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="130" y="155" text-anchor="middle" font-size="15" fill="#475569">Slack</text>
  </g>
  <g transform="rotate(6 330 190)">
    <rect x="260" y="168" width="140" height="44" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="330" y="195" text-anchor="middle" font-size="15" fill="#475569">ChatGPT chat</text>
  </g>
  <g transform="rotate(5 110 290)">
    <rect x="40" y="268" width="140" height="44" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="110" y="295" text-anchor="middle" font-size="15" fill="#475569">PR comments</text>
  </g>
  <g transform="rotate(-9 320 340)">
    <rect x="250" y="318" width="140" height="44" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="320" y="345" text-anchor="middle" font-size="15" fill="#475569">Jira tickets</text>
  </g>
  <g transform="rotate(8 170 420)">
    <rect x="100" y="398" width="140" height="44" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="170" y="425" text-anchor="middle" font-size="15" fill="#475569">A wiki page</text>
  </g>
  <text x="250" y="490" text-anchor="middle" font-size="13" font-style="italic" fill="#94A3B8">no single source, nothing talks to anything else</text>

  <!-- Right: ordered chips funneling down -->
  <g>
    <rect x="640" y="100" width="220" height="42" rx="10" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="750" y="126" text-anchor="middle" font-size="14" fill="#312E81">intent recorded</text>
    <line x1="750" y1="142" x2="750" y2="160" stroke="#6366F1" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>

    <rect x="640" y="162" width="220" height="42" rx="10" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="750" y="188" text-anchor="middle" font-size="14" fill="#312E81">decision recorded</text>
    <line x1="750" y1="204" x2="750" y2="222" stroke="#6366F1" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>

    <rect x="640" y="224" width="220" height="42" rx="10" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="750" y="250" text-anchor="middle" font-size="14" fill="#312E81">question + resolution</text>
    <line x1="750" y1="266" x2="750" y2="284" stroke="#6366F1" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>

    <rect x="640" y="286" width="220" height="42" rx="10" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
    <text x="750" y="312" text-anchor="middle" font-size="14" fill="#312E81">progress recorded</text>
    <line x1="750" y1="328" x2="750" y2="356" stroke="#6366F1" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>
  </g>

  <rect x="630" y="358" width="240" height="64" rx="12" fill="#6366F1"/>
  <text x="750" y="384" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">.capsule/log.jsonl</text>
  <text x="750" y="404" text-anchor="middle" font-size="12" fill="#E0E7FF">one append-only source of truth</text>

  <text x="750" y="490" text-anchor="middle" font-size="13" font-style="italic" fill="#64748B">read and written by every human and every agent</text>
</svg>
